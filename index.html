<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE GROUP OF COMPANY | PORTAL</title>
    <style>
        :root {
            --pink-bg: #ff7eb9;
            --pink-dark: #ff4081;
            --gold: #ffcc33;
            --glass: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff7eb9 0%, #ff4081 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* --- Floating Autumn Leaves --- */
        .autumn-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .leaf {
            position: absolute;
            border-radius: 2px 15px;
            animation: fall linear infinite;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* --- Dashboard Container --- */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        .header-title {
            margin-bottom: 40px;
        }

        .header-title h1 {
            font-size: 2.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .header-title p {
            color: var(--gold);
            font-size: 0.9rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* --- Compact Button Grid --- */
        .button-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .cyber-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(15px);
            padding: 20px;
            width: 220px; 
            border-radius: 15px;
            text-decoration: none;
            color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .cyber-btn:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.25);
            border-color: var(--gold);
        }

        .icon { font-size: 1.6rem; filter: drop-shadow(0 0 5px var(--gold)); }
        .btn-text { font-size: 0.8rem; font-weight: 700; letter-spacing: 1.2px; }

        /* --- LinkedIn Footer --- */
        .footer {
            position: relative;
            z-index: 20;
            margin-top: 20px;
        }

        .linkedin-link {
            background: rgba(0, 119, 181, 0.2);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 25px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
        }

        .linkedin-link:hover {
            background: rgba(0, 119, 181, 0.8);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 119, 181, 0.4);
        }

        @media (max-width: 600px) {
            .header-title h1 { font-size: 1.8rem; }
            .cyber-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="autumn-bg" id="leafBox"></div>

    <div class="container">
        <div class="header-title">
            <h1>CORE GROUP OF COMPANY</h1>
            <p>Elegance In AI</p>
        </div>

        <div class="button-grid">
            <a href="https://muhammadtaqi512q-oss.github.io/2/CGC" class="cyber-btn">
                <div class="icon">🏛️</div>
                <div class="btn-text">MAIN COMPANY</div>
            </a>
            <a href="https://muhammadtaqi512q-oss.github.io/2/CV" class="cyber-btn">
                <div class="icon">📄</div>
                <div class="btn-text">CV BUILDER</div>
            </a>
            <a href="https://muhammadtaqi512q-oss.github.io/2/AI" class="cyber-btn">
                <div class="icon">🎙️</div>
                <div class="btn-text">VOICE AI STUDIO</div>
            </a>
        </div>

        
    </div>

    <script>
        const leafBox = document.getElementById('leafBox');
        for (let i = 0; i < 40; i++) {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            const size = Math.random() * 10 + 8 + 'px';
            leaf.style.width = size;
            leaf.style.height = size;
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.background = Math.random() > 0.5 ? '#fff' : '#ffcc33';
            leaf.style.animationDuration = Math.random() * 5 + 4 + 's';
            leaf.style.animationDelay = Math.random() * 5 + 's';
            leafBox.appendChild(leaf);
        }
    </script>
</body>
</html>
